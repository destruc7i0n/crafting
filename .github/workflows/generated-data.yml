name: Check Generated Data

on:
  schedule:
    - cron: "0 17 * * 5"
      timezone: "America/Los_Angeles"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generated-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm generate:data
      - name: Verify generated data is committed
        run: |
          if ! git diff --quiet -- src/data/generated || [ -n "$(git ls-files --others --exclude-standard -- src/data/generated)" ]; then
            git status --short -- src/data/generated
            git diff -- src/data/generated
            echo "::error::Generated data changed. Run pnpm generate:data and commit src/data/generated."
            exit 1
          fi
