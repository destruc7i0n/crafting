name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - parallel:
          - name: Lint
            run: pnpm lint
          - name: Format
            run: pnpm format
          - name: Type check
            run: pnpm type-check
          - name: Test
            run: pnpm test
          - name: Build
            run: pnpm build
